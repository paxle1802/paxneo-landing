<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Paxneo — Admin</title>
<style>
  :root{--bg:#0a0a12;--card:#16162a;--line:rgba(255,255,255,.1);--txt:#ECECF5;--muted:#9a9ab5;--violet:#7c5cff;--cyan:#22d3ee;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);padding:24px;line-height:1.5}
  .wrap{max-width:1000px;margin:0 auto}
  h1{font-size:24px;margin-bottom:4px}.sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .gate{max-width:340px;margin:60px auto;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px}
  .gate h2{font-size:18px;margin-bottom:14px}
  input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--txt);font-size:15px}
  button{background:linear-gradient(135deg,#7c5cff,#22d3ee);color:#0a0a12;border:0;border-radius:9px;padding:11px 18px;font-weight:700;cursor:pointer;font-size:14px}
  button:disabled{opacity:.5;cursor:default}
  .row-btn{padding:8px 14px;font-size:13px}
  table{width:100%;border-collapse:collapse;margin-top:8px}
  th,td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
  th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pending{background:rgba(255,179,71,.16);color:#ffb347}
  .paid{background:rgba(34,211,120,.16);color:#3ad17a}
  .err{color:#ff7a7a;font-size:13px;margin-top:10px}
  .bar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
  .muted{color:var(--muted);font-size:13px}
  .toolbar button{background:rgba(255,255,255,.08);color:var(--txt);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div id="gate" class="gate">
    <h2>Admin access</h2>
    <input id="pw" type="password" placeholder="Admin password" autocomplete="current-password">
    <p class="err" id="gateErr"></p>
    <button id="login" style="width:100%;margin-top:12px">Sign in</button>
  </div>

  <div id="panel" style="display:none">
    <div class="bar">
      <div><h1>Orders</h1><div class="sub">Confirm payment to send the receipt + course link to the customer.</div></div>
      <div class="toolbar"><button id="refresh">Refresh</button> <button id="logout">Logout</button></div>
    </div>
    <p class="err" id="panelErr"></p>
    <div id="tableWrap"></div>
  </div>
</div>

<script>
  var pw='';
  var gate=document.getElementById('gate'), panel=document.getElementById('panel');
  function api(method, body){
    return fetch('/api/admin',{method:method,headers:{'Content-Type':'application/json','x-admin-password':pw},
      body: body?JSON.stringify(body):undefined});
  }
  function esc(s){return String(s==null?'':s).replace(/[<>&]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];});}
  function render(orders){
    if(!orders.length){ document.getElementById('tableWrap').innerHTML='<p class="muted">No orders yet.</p>'; return; }
    var rows=orders.map(function(o){
      var paid=o.status==='paid';
      return '<tr>'+
        '<td>'+esc(o.date||'')+'</td>'+
        '<td><b>'+esc(o.name)+'</b><br><span class="muted">'+esc(o.email)+'</span></td>'+
        '<td>'+esc(o.courseName)+'</td>'+
        '<td>'+esc(o.amountDisplay)+'</td>'+
        '<td><span class="pill '+(paid?'paid':'pending')+'">'+(paid?'PAID':'PENDING')+'</span></td>'+
        '<td>'+(paid?'<span class="muted">'+esc(o.receiptNo||'sent')+'</span>'
              :'<button class="row-btn" data-id="'+esc(o.id)+'">Confirm payment</button>')+'</td>'+
      '</tr>';
    }).join('');
    document.getElementById('tableWrap').innerHTML=
      '<table><thead><tr><th>Date</th><th>Customer</th><th>Course</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead><tbody>'+rows+'</tbody></table>';
    document.querySelectorAll('.row-btn').forEach(function(btn){
      btn.addEventListener('click', function(){ confirmPay(btn.getAttribute('data-id'), btn); });
    });
  }
  function load(){
    document.getElementById('panelErr').textContent='';
    api('GET').then(function(r){
      if(r.status===401){ logout('Wrong password.'); return null; }
      return r.json();
    }).then(function(d){ if(d&&d.ok) render(d.orders||[]); else if(d) document.getElementById('panelErr').textContent=(d.error||'Error')+(d.detail?(': '+d.detail):''); });
  }
  function confirmPay(id, btn){
    if(!confirm('Confirm payment and email receipt + course link to the customer?')) return;
    btn.disabled=true; btn.textContent='Sending...';
    api('POST',{id:id}).then(function(r){return r.json();}).then(function(d){
      if(d&&d.ok){ load(); } else { btn.disabled=false; btn.textContent='Confirm payment'; alert((d&&d.error||'Failed')+((d&&d.detail)?('\n'+d.detail):'')); }
    }).catch(function(){ btn.disabled=false; btn.textContent='Confirm payment'; alert('Network error'); });
  }
  function showPanel(){ gate.style.display='none'; panel.style.display=''; load(); }
  function logout(msg){ pw=''; try{sessionStorage.removeItem('pxadm');}catch(e){} panel.style.display='none'; gate.style.display='';
    if(msg) document.getElementById('gateErr').textContent=msg; }
  document.getElementById('login').addEventListener('click', function(){
    pw=document.getElementById('pw').value;
    document.getElementById('gateErr').textContent='';
    api('GET').then(function(r){
      if(r.ok){ try{sessionStorage.setItem('pxadm',pw);}catch(e){} showPanel(); }
      else { document.getElementById('gateErr').textContent='Wrong password.'; }
    }).catch(function(){ document.getElementById('gateErr').textContent='Network error.'; });
  });
  document.getElementById('pw').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('login').click(); });
  document.getElementById('refresh').addEventListener('click', load);
  document.getElementById('logout').addEventListener('click', function(){ logout(); });
  // resume session
  try{ var s=sessionStorage.getItem('pxadm'); if(s){ pw=s; showPanel(); } }catch(e){}
</script>
</body>
</html>
